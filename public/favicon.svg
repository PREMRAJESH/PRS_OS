  <circle cx="256" cy="256" r="230" fill="#080a10" stroke="url(#cyanGrad)" stroke-width="16" />
  <text x="256" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="150" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">
    PRS
